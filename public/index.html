<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALF Financial Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap">
<style>
  :root {
    --paper: #F7F3E8;
    --paper-dark: #EFE8D6;
    --ink: #1B1815;
    --ink-soft: #4A443C;
    --ink-faint: #8A8271;
    --rule: #1B1815;
    --accent: #7A1F1F;
    --hair: #D8D0BC;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #DAD5C6;
    color: var(--ink);
    font-family: "PT Serif", Georgia, "Times New Roman", serif;
  }
  .stage { max-width: 880px; margin: 0 auto; padding: 3rem 1rem 5rem; perspective: 1800px; }
  .stack-wrap { position: relative; }
  .stack-wrap .deck {
    position: absolute; inset: 0; background: var(--paper-dark);
    border: 1px solid var(--hair);
  }
  .stack-wrap .deck.d1 { transform: rotate(-1.1deg) translate(6px, 8px); z-index: 1; }
  .stack-wrap .deck.d2 { transform: rotate(0.8deg) translate(-5px, 12px); z-index: 0; }
  .paper {
    position: relative; z-index: 2;
    background: var(--paper);
    border: 1px solid var(--hair);
    box-shadow: 0 24px 48px rgba(20,16,8,0.28), 0 4px 12px rgba(20,16,8,0.18);
    transform: rotateX(1deg) rotateY(-0.4deg);
    padding: 2.25rem 2.5rem 2.75rem;
  }
  .masthead { text-align: center; }
  .masthead h1 {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 900; font-size: 46px; letter-spacing: 1px; margin: 0;
    text-transform: uppercase;
  }
  .masthead .tagline { font-style: italic; color: var(--ink-soft); font-size: 13px; margin: 4px 0 0; }
  .masthead-info {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-soft);
    margin: 14px 0 6px; padding-top: 8px; border-top: 1px solid var(--rule);
  }
  .rule-thick { border: none; border-top: 3px solid var(--rule); margin: 2px 0 1px; }
  .rule-thin { border: none; border-top: 1px solid var(--rule); margin: 0 0 16px; }
  .editions { text-align: center; margin: 0 0 20px; }
  .editions button {
    font-family: "PT Serif", serif; background: none; border: none; cursor: pointer;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-faint);
    padding: 4px 14px; border-bottom: 2px solid transparent;
  }
  .editions button.active { color: var(--ink); border-bottom: 2px solid var(--accent); font-weight: 700; }
  .editions span { color: var(--hair); }
  #articles { transform-style: preserve-3d; }
  .lead { border-bottom: 1px double var(--rule); padding-bottom: 20px; margin-bottom: 20px; }
  .kicker {
    display: inline-block; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin-bottom: 6px;
  }
  .lead h2 {
    font-family: "Playfair Display", serif; font-size: 32px; line-height: 1.15; margin: 0 0 10px; font-weight: 800;
  }
  .byline { font-size: 12px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .lead-body { columns: 2; column-gap: 28px; font-size: 15.5px; line-height: 1.65; text-align: justify; hyphens: auto; }
  .lead-body p { margin: 0 0 10px; }
  .lead-body p::first-letter {
    font-family: "Playfair Display", serif; font-size: 46px; font-weight: 900; float: left;
    line-height: 0.8; padding: 4px 6px 0 0; color: var(--ink);
  }
  .analysis { font-size: 14px; color: var(--ink-soft); margin: 8px 0 0; break-inside: avoid; }
  .analysis b { color: var(--ink); }
  .pullquote {
    font-family: "Playfair Display", serif; font-style: italic; font-size: 20px; line-height: 1.4;
    text-align: center; color: var(--ink); margin: 16px auto 6px; max-width: 520px;
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 12px 8px;
  }
  .pullquote .label { display: block; font-family: "PT Serif", serif; font-style: normal; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 6px; font-weight: 700; }
  .tags-row { text-align: center; font-size: 11px; color: var(--ink-faint); text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 8px; }
  .columns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 28px; }
  .story { border-top: 1px solid var(--hair); padding-top: 14px; margin-top: 14px; break-inside: avoid; }
  .story h3 { font-family: "Playfair Display", serif; font-size: 19px; line-height: 1.25; margin: 0 0 6px; font-weight: 700; }
  .story .kicker { font-size: 10.5px; }
  .story .byline { margin-bottom: 8px; }
  .story p { font-size: 14px; line-height: 1.6; text-align: justify; hyphens: auto; margin: 0 0 8px; }
  .story .pullquote { font-size: 15px; margin: 10px auto 4px; padding: 8px 4px; }
  .story .tags-row { text-align: left; }
  .footnote { text-align: center; font-size: 11px; color: var(--ink-faint); font-style: italic; margin-top: 24px;
    border-top: 1px solid var(--hair); padding-top: 12px; }
  @media (max-width: 640px) {
    .paper { padding: 1.5rem 1.25rem 2rem; }
    .masthead h1 { font-size: 30px; }
    .lead h2 { font-size: 24px; }
    .lead-body { columns: 1; }
    .columns-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="stack-wrap">
    <div class="deck d1"></div>
    <div class="deck d2"></div>
    <div class="paper">
      <div class="masthead">
        <h1>Galf Financial Journal</h1>
        <p class="tagline">Notizie che contano. Punti di vista che fanno discutere.</p>
      </div>
      <div class="masthead-info">
        <span id="today-date">Lun 20 lug 2026</span>
        <span id="edition-label">Edizione del mattino</span>
        <span>A cura di Giulio Alfarano</span>
      </div>
      <hr class="rule-thick"><hr class="rule-thin">

      <div class="editions">
        <button id="btn-morning" class="active">Edizione 6:00</button>
        <span>&mdash;</span>
        <button id="btn-afternoon">Edizione 14:00</button>
      </div>

      <div id="articles"></div>

      <p class="footnote">Edizione generata automaticamente sulla base delle notizie finanziarie reali della giornata.</p>
    </div>
  </div>
</div>

<script>
var data = {
  morning: [
    {cat:'Geopolitica', rel:'Alta', source:'Bloomberg Markets', time:'05:30', title:'Il Brent sfonda quota 90: Teheran dà per morta la tregua', sintesi:'Il greggio è balzato di quasi il 4% dopo che nel fine settimana l\'Iran ha colpito un impianto petrolifero chiave in Kuwait e preso di mira navi in transito nello Stretto di Hormuz: il Brent è salito sopra i 90 dollari, massimo da metà giugno, con il WTI vicino a 84. Teheran ha dichiarato che il cessate il fuoco con gli Stati Uniti è di fatto crollato.', perche:'L\'attacco a un\'infrastruttura petrolifera del Kuwait, a centinaia di chilometri dallo Stretto, dimostra che il conflitto non è più contenibile dentro Hormuz: ora è in gioco l\'intera offerta del Golfo.', spunto:'Il greggio a 90 dollari non è il picco della paura: è il prezzo di un mercato che ancora si rifiuta di credere alla chiusura vera di Hormuz.', tags:['X','Video']},
    {cat:'Azionario', rel:'Alta', source:'Bloomberg', time:'05:50', title:'I chip precipitano in mercato orso: bruciati 1.500 miliardi', sintesi:'L\'indice dei semiconduttori di Filadelfia ha archiviato la settimana peggiore da marzo 2025 (-11%) ed è ufficialmente in mercato orso, a -20% dal record di fine giugno, con circa 1.500 miliardi di dollari di capitalizzazione svaniti. Marvell, ARM e Intel perdono oltre il 30% dai massimi, mentre il modello cinese Kimi K3 di Moonshot alimenta i dubbi sulla sostenibilità della spesa in AI.', perche:'Dopo un rally del 105% in tre mesi, il settore che ha tenuto in piedi Wall Street sta scoprendo che le aspettative sull\'AI erano prezzate per la perfezione.', spunto:'Un indice che perde il 20% e resta a +65% da gennaio non è un crollo: è una bolla che si sgonfia appena, e chiamarla "occasione d\'acquisto" è il vero azzardo.', tags:['LinkedIn','X']},
    {cat:'Crypto', rel:'Media', source:'CoinDesk', time:'18:00', title:'Maxi-scommessa da 2,5 miliardi: Bitcoin a 72.000 dollari entro il 31 luglio', sintesi:'Sul mercato delle opzioni sono comparsi call spread su Bitcoin per circa 2,5 miliardi di dollari di nozionale con obiettivo 72.000 dollari entro fine mese, scadenza allineata alla riunione della Fed del 29 luglio, mentre il prezzo spot resta sotto i 63.000 dollari, zavorrato dalle tensioni in Medio Oriente.', perche:'Qualcuno con tasche molto profonde sta scommettendo che la Fed, non la guerra, sarà il catalizzatore del mese per gli asset di rischio.', spunto:'Comprare call su Bitcoin sperando nella Fed è ammettere che la crypto "decentralizzata" vive appesa alle parole di un banchiere centrale.', tags:['X','Threads']},
    {cat:'Macro', rel:'Media', source:'CNBC / Mohamed El-Erian', time:'14:00', title:'El-Erian sfida i falchi: "Il picco dell\'inflazione è alle spalle"', sintesi:'Mohamed El-Erian, chief economic adviser di Allianz, ha detto nei giorni scorsi alla CNBC di aspettarsi che i dati sui prezzi mostrino "il picco del ciclo inflattivo", con consumi ancora solidi e una Fed guidata da Kevin Warsh che definisce "più moderna e orientata alle riforme". Gli economisti stimano un\'inflazione headline in calo verso il 3,8%.', perche:'Se ha ragione lui, la riunione Fed del 29 luglio arriva con il peggio già passato; se ha torto, il petrolio sopra i 90 dollari riaccenderà tutto in poche settimane.', spunto:'Con il greggio a 90 dollari, dichiarare vinta la battaglia sull\'inflazione non è ottimismo: è il modo più rapido per doverla ricombattere.', tags:['LinkedIn','Threads']},
    {cat:'Crypto', rel:'Media', source:'Cointelegraph', time:'20:00', title:'Washington manca la scadenza del GENIUS Act, Parigi oscura Polymarket', sintesi:'I regolatori americani hanno lasciato scadere il termine per le regole attuative del GENIUS Act sulle stablecoin, mentre la Francia ha ordinato ai provider di bloccare l\'accesso a Polymarket e le autorità europee hanno aggiunto 14 società crypto al registro MiCA.', perche:'Nel giro di un weekend l\'America ha mostrato di non saper applicare le proprie leggi crypto e l\'Europa di saperle far rispettare fin troppo: due modelli regolatori che divergono sempre più.', spunto:'L\'Europa che blocca e registra sta regolando la crypto più sul serio dell\'America, che scrive leggi storiche e poi ne manca le scadenze.', tags:['LinkedIn','X']}
  ],
  afternoon: [
    {cat:'Geopolitica', rel:'Alta', source:'Reuters / TheStreet', time:'13:00', title:'Sesta notte di raid sull\'Iran, ma Wall Street compra lo stesso', sintesi:'Gli Stati Uniti hanno lanciato una nuova ondata di attacchi sull\'Iran e annunciato la morte di un altro militare americano, mentre il transito di greggio nello Stretto di Hormuz è crollato del 62%, a 4,1 milioni di barili al giorno. Eppure i futures di Wall Street salgono e il petrolio resta poco mosso.', perche:'Quando i mercati smettono di reagire a una guerra che taglia i due terzi del petrolio da Hormuz, o hanno ragione loro o stiamo tutti sottovalutando il rischio: benzina e bollette lo diranno presto.', spunto:'Una Borsa che sale durante una guerra per il petrolio non è coraggiosa: è anestetizzata, e il risveglio si paga caro.', tags:['X','LinkedIn']},
    {cat:'Macro', rel:'Alta', source:'CME FedWatch / Yahoo Finance', time:'12:30', title:'La Fed che doveva tagliare ora spaventa: uno su tre scommette sul rialzo', sintesi:'Con i tassi fermi al 3,50-3,75%, la probabilità di un rialzo alla riunione del 29 luglio prezzata dai mercati è balzata al 36%, dal 18% di inizio mese, per colpa dell\'inflazione ancora sopra il target e del petrolio caro. Mohamed El-Erian (Allianz) frena: i dati sul lavoro "dovrebbero raffreddare le attese di un rialzo".', perche:'Se la banca centrale americana alza i tassi invece di tagliarli, mutui, prestiti e Borse di tutto il mondo lo sentiranno subito.', spunto:'Il vero rischio del 2026 non è la guerra: è una Fed costretta ad alzare i tassi mentre tutti avevano scommesso sui tagli.', tags:['LinkedIn','X']},
    {cat:'Azionario', rel:'Media', source:'CNBC', time:'11:45', title:'Tesla, Alphabet e Intel alla prova: la settimana che giudica l\'AI', sintesi:'Mercoledì tocca a Tesla e Alphabet, giovedì a Intel: 77 società dell\'S&P 500 pubblicano i conti questa settimana. Finora quasi 9 aziende su 10 hanno battuto le attese, e i riflettori sono puntati sui 180-190 miliardi di dollari che Alphabet spenderà quest\'anno in infrastrutture per l\'intelligenza artificiale.', perche:'Dopo il crollo dei chip della settimana scorsa, questi conti diranno se la spesa in AI è un investimento o una fuga in avanti.', spunto:'190 miliardi in un anno per l\'AI: se Alphabet non dimostra presto che rendono, non è visione, è la scommessa più costosa della storia.', tags:['LinkedIn','Video']},
    {cat:'Azionario', rel:'Media', source:'TheStreet', time:'12:10', title:'AMC vola del 16%: il cinema era stato seppellito troppo presto', sintesi:'La più grande catena di cinema al mondo ha battuto le stime trimestrali e il titolo è balzato del 16% prima dell\'apertura; bene anche Domino\'s Pizza (+7%) grazie ai ricavi sopra le attese. Il consumatore americano, dato per spacciato dai tassi alti, continua a pagare biglietti e pizze.', perche:'Finché la gente spende in svaghi, la temuta recessione americana resta un racconto, non un dato.', spunto:'Da anni i guru annunciano la morte del cinema e del consumatore americano: entrambi sono più vivi di molti dei loro necrologi.', tags:['X','Threads']},
    {cat:'Crypto', rel:'Media', source:'Investing News', time:'13:20', title:'Gli ETF su Bitcoin tornano a incassare: finita la fuga di dieci giorni', sintesi:'Dopo dieci sedute consecutive di uscite, i fondi americani che investono in Bitcoin (gli ETF, comprabili come normali azioni) hanno raccolto 221,7 milioni di dollari in un giorno, il dato migliore da due mesi, con il fondo di BlackRock in testa. Il prezzo però resta fermo poco sopra i 64.000 dollari.', perche:'I grandi investitori ricomprano Bitcoin mentre il prezzo non si muove: qualcuno sta accumulando in silenzio, e di solito non lo fa per beneficenza.', spunto:'Un Bitcoin fermo mentre entrano i miliardi degli ETF racconta una sola cosa: i grandi stanno comprando ciò che i piccoli, stanchi, svendono.', tags:['X','Threads']}
  ]
};

function renderEdition(edition){
  document.getElementById('edition-label').textContent = edition === 'morning' ? 'Edizione del mattino' : 'Edizione del pomeriggio';
  document.getElementById('btn-morning').className = edition === 'morning' ? 'active' : '';
  document.getElementById('btn-afternoon').className = edition === 'afternoon' ? 'active' : '';
  var items = data[edition];
  var container = document.getElementById('articles');
  var lead = items[0];
  var rest = items.slice(1);

  var html = '';
  html += '<div class="lead">' +
    '<span class="kicker">' + lead.cat + ' &middot; Rilevanza ' + lead.rel + '</span>' +
    '<h2>' + lead.title + '</h2>' +
    '<div class="byline">' + lead.source + ' &middot; ' + lead.time + '</div>' +
    '<div class="lead-body"><p>' + lead.sintesi + '</p><p class="analysis"><b>Perché conta.</b> ' + lead.perche + '</p></div>' +
    '<div class="pullquote"><span class="label">Spunto per un post</span>' + lead.spunto + '</div>' +
    '<div class="tags-row">' + lead.tags.join(' &middot; ') + '</div>' +
  '</div>';

  html += '<div class="columns-grid">';
  rest.forEach(function(item){
    html += '<div class="story">' +
      '<span class="kicker">' + item.cat + ' &middot; Rilevanza ' + item.rel + '</span>' +
      '<h3>' + item.title + '</h3>' +
      '<div class="byline">' + item.source + ' &middot; ' + item.time + '</div>' +
      '<p>' + item.sintesi + '</p>' +
      '<p class="analysis"><b>Perché conta.</b> ' + item.perche + '</p>' +
      '<div class="pullquote"><span class="label">Spunto per un post</span>' + item.spunto + '</div>' +
      '<div class="tags-row">' + item.tags.join(' &middot; ') + '</div>' +
    '</div>';
  });
  html += '</div>';

  container.innerHTML = html;
}

function switchEdition(edition){
  var el = document.getElementById('articles');
  el.style.transformOrigin = 'left center';
  el.style.transition = 'transform .35s ease, opacity .35s ease';
  el.style.transform = 'rotateY(-90deg)';
  el.style.opacity = '0';
  setTimeout(function(){
    renderEdition(edition);
    el.style.transition = 'none';
    el.style.transform = 'rotateY(90deg)';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        el.style.transition = 'transform .35s ease, opacity .35s ease';
        el.style.transform = 'rotateY(0deg)';
        el.style.opacity = '1';
      });
    });
  }, 350);
}

document.getElementById('btn-morning').addEventListener('click', function(){ switchEdition('morning'); });
document.getElementById('btn-afternoon').addEventListener('click', function(){ switchEdition('afternoon'); });
renderEdition('morning');
</script>
</body>
</html>
