<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALF Financial Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap">
<style>
  :root {
    --paper: #F7F3E8;
    --paper-dark: #EFE8D6;
    --ink: #1B1815;
    --ink-soft: #4A443C;
    --ink-faint: #8A8271;
    --rule: #1B1815;
    --accent: #7A1F1F;
    --hair: #D8D0BC;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #DAD5C6;
    color: var(--ink);
    font-family: "PT Serif", Georgia, "Times New Roman", serif;
  }
  .stage { max-width: 880px; margin: 0 auto; padding: 3rem 1rem 5rem; perspective: 1800px; }
  .stack-wrap { position: relative; }
  .stack-wrap .deck {
    position: absolute; inset: 0; background: var(--paper-dark);
    border: 1px solid var(--hair);
  }
  .stack-wrap .deck.d1 { transform: rotate(-1.1deg) translate(6px, 8px); z-index: 1; }
  .stack-wrap .deck.d2 { transform: rotate(0.8deg) translate(-5px, 12px); z-index: 0; }
  .paper {
    position: relative; z-index: 2;
    background: var(--paper);
    border: 1px solid var(--hair);
    box-shadow: 0 24px 48px rgba(20,16,8,0.28), 0 4px 12px rgba(20,16,8,0.18);
    transform: rotateX(1deg) rotateY(-0.4deg);
    padding: 2.25rem 2.5rem 2.75rem;
  }
  .masthead { text-align: center; }
  .masthead h1 {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 900; font-size: 46px; letter-spacing: 1px; margin: 0;
    text-transform: uppercase;
  }
  .masthead .tagline { font-style: italic; color: var(--ink-soft); font-size: 13px; margin: 4px 0 0; }
  .masthead-info {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-soft);
    margin: 14px 0 6px; padding-top: 8px; border-top: 1px solid var(--rule);
  }
  .rule-thick { border: none; border-top: 3px solid var(--rule); margin: 2px 0 1px; }
  .rule-thin { border: none; border-top: 1px solid var(--rule); margin: 0 0 16px; }
  .editions { text-align: center; margin: 0 0 20px; }
  .editions button {
    font-family: "PT Serif", serif; background: none; border: none; cursor: pointer;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-faint);
    padding: 4px 14px; border-bottom: 2px solid transparent;
  }
  .editions button.active { color: var(--ink); border-bottom: 2px solid var(--accent); font-weight: 700; }
  .editions span { color: var(--hair); }
  #articles { transform-style: preserve-3d; }
  .lead { border-bottom: 1px double var(--rule); padding-bottom: 20px; margin-bottom: 20px; }
  .kicker {
    display: inline-block; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin-bottom: 6px;
  }
  .lead h2 {
    font-family: "Playfair Display", serif; font-size: 32px; line-height: 1.15; margin: 0 0 10px; font-weight: 800;
  }
  .byline { font-size: 12px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .lead-body { columns: 2; column-gap: 28px; font-size: 15.5px; line-height: 1.65; text-align: justify; hyphens: auto; }
  .lead-body p { margin: 0 0 10px; }
  .lead-body p::first-letter {
    font-family: "Playfair Display", serif; font-size: 46px; font-weight: 900; float: left;
    line-height: 0.8; padding: 4px 6px 0 0; color: var(--ink);
  }
  .analysis { font-size: 14px; color: var(--ink-soft); margin: 8px 0 0; break-inside: avoid; }
  .analysis b { color: var(--ink); }
  .pullquote {
    font-family: "Playfair Display", serif; font-style: italic; font-size: 20px; line-height: 1.4;
    text-align: center; color: var(--ink); margin: 16px auto 6px; max-width: 520px;
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 12px 8px;
  }
  .pullquote .label { display: block; font-family: "PT Serif", serif; font-style: normal; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 6px; font-weight: 700; }
  .tags-row { text-align: center; font-size: 11px; color: var(--ink-faint); text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 8px; }
  .columns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 28px; }
  .story { border-top: 1px solid var(--hair); padding-top: 14px; margin-top: 14px; break-inside: avoid; }
  .story h3 { font-family: "Playfair Display", serif; font-size: 19px; line-height: 1.25; margin: 0 0 6px; font-weight: 700; }
  .story .kicker { font-size: 10.5px; }
  .story .byline { margin-bottom: 8px; }
  .story p { font-size: 14px; line-height: 1.6; text-align: justify; hyphens: auto; margin: 0 0 8px; }
  .story .pullquote { font-size: 15px; margin: 10px auto 4px; padding: 8px 4px; }
  .story .tags-row { text-align: left; }
  .footnote { text-align: center; font-size: 11px; color: var(--ink-faint); font-style: italic; margin-top: 24px;
    border-top: 1px solid var(--hair); padding-top: 12px; }
  @media (max-width: 640px) {
    .paper { padding: 1.5rem 1.25rem 2rem; }
    .masthead h1 { font-size: 30px; }
    .lead h2 { font-size: 24px; }
    .lead-body { columns: 1; }
    .columns-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="stack-wrap">
    <div class="deck d1"></div>
    <div class="deck d2"></div>
    <div class="paper">
      <div class="masthead">
        <h1>Galf Financial Journal</h1>
        <p class="tagline">Notizie che contano. Punti di vista che fanno discutere.</p>
      </div>
      <div class="masthead-info">
        <span id="today-date">Gio 23 lug 2026</span>
        <span id="edition-label">Edizione del mattino</span>
        <span>A cura di Giulio Alfarano</span>
      </div>
      <hr class="rule-thick"><hr class="rule-thin">

      <div class="editions">
        <button id="btn-morning" class="active">Edizione 6:00</button>
        <span>&mdash;</span>
        <button id="btn-afternoon">Edizione 14:00</button>
      </div>

      <div id="articles"></div>

      <p class="footnote">Edizione generata automaticamente sulla base delle notizie finanziarie reali della giornata.</p>
    </div>
  </div>
</div>

<script>
var data = {
  morning: [
    {cat:'Azionario', rel:'Alta', source:'Bloomberg Markets', time:'05:30', title:'Tesla vende come non mai ma guadagna quasi zero: l\'AI presenta il conto', sintesi:'Tesla ha chiuso il trimestre con ricavi record di 28,2 miliardi di dollari (+26%), ma l\'utile operativo è crollato del 57% e il margine è sceso all\'1,4%: la corsa a robotaxi e intelligenza artificiale ha mandato la cassa in rosso di oltre un miliardo. Titolo in calo di oltre il 3%, mentre Alphabet batte le attese con quasi 120 miliardi di ricavi (+24%).', perche:'Stessa scommessa sull\'AI, due risultati opposti: chi ha fondi tech nel portafoglio deve capire quale dei due modelli sta finanziando.', spunto:'Vendere più auto che mai e guadagnare l\'1,4% non è crescita: è la prova che nell\'AI si può correre fortissimo verso margini da supermercato.', tags:['LinkedIn','Video']},
    {cat:'Commodities', rel:'Alta', source:'Reuters Business', time:'05:45', title:'Il petrolio sfonda quota 95: la guerra con l\'Iran incendia i prezzi', sintesi:'Il Brent è balzato oltre 95 dollari al barile (+4%), massimo da sei settimane, con il WTI a 88, dopo l\'undicesima notte consecutiva di raid americani sull\'Iran e le minacce degli Houthi alle navi nel Mar Rosso. In un mese il greggio è salito di oltre il 20%.', perche:'Ogni dollaro in più sul barile finisce dritto su benzina, bollette e carrello della spesa: questa guerra la paghiamo tutti, ogni giorno.', spunto:'Chi chiama ancora "picco temporaneo" il petrolio a 95 dollari si sta raccontando una favola: il mercato ha già prezzato una guerra lunga.', tags:['X','LinkedIn']},
    {cat:'Macro', rel:'Alta', source:'Bloomberg Markets', time:'05:15', title:'Yen ai minimi da 40 anni: Tokyo minaccia, i mercati non le credono', sintesi:'Lo yen è scivolato oltre 163 per dollaro, il livello più debole dal 1986, spinto giù da petrolio caro e rendimenti americani in salita. La ministra delle Finanze Katayama promette "azione decisa", ma il Giappone era già intervenuto ad aprile e maggio spendendo miliardi, e la valuta è più debole di prima.', perche:'Quando un colosso del G7 non riesce a difendere la propria moneta, il messaggio a tutti i risparmiatori è che le banche centrali non sono onnipotenti.', spunto:'Due interventi bruciati e uno yen ai minimi da 40 anni: Tokyo sta dimostrando al mondo che contro i mercati le parole non valgono niente.', tags:['LinkedIn','X']},
    {cat:'Macro', rel:'Media', source:'CME FedWatch / Chase', time:'06:00', title:'Warsh sbarra la strada: "Prezzi troppo alti", niente taglio dei tassi', sintesi:'Il presidente della Fed Kevin Warsh ha definito i prezzi "ancora troppo alti" e i futures danno probabilità zero a un taglio dei tassi alla riunione del 28-29 luglio. Dentro la Fed si indicano due colpevoli: il petrolio di guerra e il boom dei data center per l\'AI, oltre 1.500 miliardi di progetti che alzano i costi di chip ed elettricità.', perche:'Tassi fermi significa mutui e prestiti cari ancora a lungo: e stavolta la colpa non è solo della guerra, ma anche della corsa all\'AI.', spunto:'L\'AI doveva abbassare i costi di tutto: per ora sta alzando l\'inflazione di tutti, e la Fed lo ha appena messo nero su bianco.', tags:['LinkedIn','X']},
    {cat:'Crypto', rel:'Media', source:'Cointelegraph', time:'05:00', title:'Bitcoin tiene quota 66.000: i grandi fondi sono tornati a comprare', sintesi:'Bitcoin si muove in area 66.000 dollari con la seconda settimana consecutiva di afflussi negli ETF, i fondi quotati che comprano crypto per conto degli investitori: non accadeva da maggio. Intanto Grayscale prepara distribuzioni in contanti dai premi di staking, le ricompense generate custodendo Ether e Solana.', perche:'Quando i fondi regolamentati ricominciano a comprare e a distribuire cedole, la crypto smette di essere scommessa e inizia a somigliare alla Borsa.', spunto:'Un Bitcoin che paga cedole tramite Wall Street ha vinto la battaglia dei prezzi perdendo quella dell\'anima: la finanza ribelle è diventata finanza e basta.', tags:['X','Threads']}
  ],
  afternoon: [
    {cat:'Azionario', rel:'Alta', source:'Bloomberg Markets', time:'13:30', title:'Alphabet batte ogni previsione e crolla del 5%: l\'AI ora fa paura', sintesi:'Ricavi record a 119,8 miliardi di dollari (+24%) e cloud in crescita dell\'82%, eppure il titolo perde oltre il 5%: Alphabet ha alzato fino a 205 miliardi le spese previste quest\'anno per l\'intelligenza artificiale, e per la prima volta la cassa è finita in negativo.', perche:'Quando anche i risultati migliori non bastano più a giustificare le spese, il problema non è l\'azienda: è il prezzo che il mercato ha dato all\'AI.', spunto:'Se batti ogni previsione e la Borsa ti punisce lo stesso, il messaggio è uno: Wall Street non compra più promesse sull\'AI, vuole vedere i soldi.', tags:['LinkedIn','Video']},
    {cat:'Macro', rel:'Alta', source:'Reuters Business', time:'12:30', title:'La Fed cambia verso: i mercati ora scommettono sui rialzi dei tassi', sintesi:'I futures, i contratti con cui i mercati scommettono sulle mosse della Fed, danno ormai quasi per certo un rialzo dei tassi a ottobre, e Bank of America ne prevede tre entro dicembre. Sei mesi fa si parlava solo di tagli: con l\'inflazione al 3,6% e il petrolio di guerra, la rotta si è invertita.', perche:'Mutui, prestiti e finanziamenti non solo resteranno cari: potrebbero rincarare ancora, e quasi nessuno ci si sta preparando.', spunto:'Il mercato ha passato due anni ad aspettare tagli che non arrivavano: ora rischia di farsi travolgere dai rialzi che non voleva vedere.', tags:['LinkedIn','X']},
    {cat:'Geopolitica', rel:'Alta', source:'Reuters Business', time:'13:00', title:'Il petrolio corre verso i 100 dollari: due rotte sotto tiro insieme', sintesi:'Il Brent ha toccato 98 dollari al barile, nuovo massimo, con il WTI sopra 90: la guerra tra Stati Uniti e Iran ha ridotto il traffico delle petroliere nello Stretto di Hormuz, mentre gli Houthi minacciano di bloccare le navi saudite nel Mar Rosso.', perche:'Da quelle due rotte passa gran parte del petrolio mondiale: se si chiudono davvero, i 100 dollari saranno solo l\'inizio.', spunto:'Il petrolio a 100 dollari non sarà un incidente di percorso: è il prezzo di un mondo che ha smesso di fare pace.', tags:['X','LinkedIn']},
    {cat:'Crypto', rel:'Media', source:'Standard Chartered / Yahoo Finance', time:'12:00', title:'Bitcoin a 100.000? La banca ci crede, chi ha comprato ai massimi no', sintesi:'Standard Chartered ha confermato l\'obiettivo di 100.000 dollari per Bitcoin entro fine anno, col prezzo oggi in area 66.000. Ma i dati dicono altro: chi ha comprato tra 75.000 e 126.000 sta vendendo in perdita, e da inizio anno gli ETF hanno perso quasi 5 miliardi di afflussi netti.', perche:'Tra l\'ottimismo delle banche e i portafogli in rosso dei risparmiatori c\'è un divario che qualcuno, prima o poi, dovrà spiegare.', spunto:'Le previsioni a 100.000 dollari le firmano le banche, le perdite reali le incassano i risparmiatori: guardate chi vende, non chi parla.', tags:['X','Threads']},
    {cat:'Commodities', rel:'Media', source:'Bloomberg Markets', time:'13:15', title:'L\'oro tradisce chi cerca rifugio: giù sotto 4.100 dollari in piena guerra', sintesi:'L\'oro è sceso sotto i 4.100 dollari l\'oncia, in ritirata dai massimi, nonostante la guerra e un dollaro debole. A pesare è la paura dei rialzi dei tassi: se il denaro rende di più in banca, il metallo che non paga interessi perde attrattiva.', perche:'Milioni di risparmiatori comprano oro convinti che protegga sempre: oggi scoprono che anche il bene rifugio ha un rivale, e si chiama tasso d\'interesse.', spunto:'L\'oro che scende mentre le bombe cadono smonta il mito del bene rifugio perfetto: nel 2026 il vero rifugio è il rendimento.', tags:['LinkedIn','Threads']}
  ]
};

function renderEdition(edition){
  document.getElementById('edition-label').textContent = edition === 'morning' ? 'Edizione del mattino' : 'Edizione del pomeriggio';
  document.getElementById('btn-morning').className = edition === 'morning' ? 'active' : '';
  document.getElementById('btn-afternoon').className = edition === 'afternoon' ? 'active' : '';
  var items = data[edition];
  var container = document.getElementById('articles');
  var lead = items[0];
  var rest = items.slice(1);

  var html = '';
  html += '<div class="lead">' +
    '<span class="kicker">' + lead.cat + ' &middot; Rilevanza ' + lead.rel + '</span>' +
    '<h2>' + lead.title + '</h2>' +
    '<div class="byline">' + lead.source + ' &middot; ' + lead.time + '</div>' +
    '<div class="lead-body"><p>' + lead.sintesi + '</p><p class="analysis"><b>Perché conta.</b> ' + lead.perche + '</p></div>' +
    '<div class="pullquote"><span class="label">Spunto per un post</span>' + lead.spunto + '</div>' +
    '<div class="tags-row">' + lead.tags.join(' &middot; ') + '</div>' +
  '</div>';

  html += '<div class="columns-grid">';
  rest.forEach(function(item){
    html += '<div class="story">' +
      '<span class="kicker">' + item.cat + ' &middot; Rilevanza ' + item.rel + '</span>' +
      '<h3>' + item.title + '</h3>' +
      '<div class="byline">' + item.source + ' &middot; ' + item.time + '</div>' +
      '<p>' + item.sintesi + '</p>' +
      '<p class="analysis"><b>Perché conta.</b> ' + item.perche + '</p>' +
      '<div class="pullquote"><span class="label">Spunto per un post</span>' + item.spunto + '</div>' +
      '<div class="tags-row">' + item.tags.join(' &middot; ') + '</div>' +
    '</div>';
  });
  html += '</div>';

  container.innerHTML = html;
}

function switchEdition(edition){
  var el = document.getElementById('articles');
  el.style.transformOrigin = 'left center';
  el.style.transition = 'transform .35s ease, opacity .35s ease';
  el.style.transform = 'rotateY(-90deg)';
  el.style.opacity = '0';
  setTimeout(function(){
    renderEdition(edition);
    el.style.transition = 'none';
    el.style.transform = 'rotateY(90deg)';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        el.style.transition = 'transform .35s ease, opacity .35s ease';
        el.style.transform = 'rotateY(0deg)';
        el.style.opacity = '1';
      });
    });
  }, 350);
}

document.getElementById('btn-morning').addEventListener('click', function(){ switchEdition('morning'); });
document.getElementById('btn-afternoon').addEventListener('click', function(){ switchEdition('afternoon'); });
renderEdition('morning');
</script>
</body>
</html>
