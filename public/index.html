<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALF Financial Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap">
<style>
  :root {
    --paper: #F7F3E8;
    --paper-dark: #EFE8D6;
    --ink: #1B1815;
    --ink-soft: #4A443C;
    --ink-faint: #8A8271;
    --rule: #1B1815;
    --accent: #7A1F1F;
    --hair: #D8D0BC;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #DAD5C6;
    color: var(--ink);
    font-family: "PT Serif", Georgia, "Times New Roman", serif;
  }
  .stage { max-width: 880px; margin: 0 auto; padding: 3rem 1rem 5rem; perspective: 1800px; }
  .stack-wrap { position: relative; }
  .stack-wrap .deck {
    position: absolute; inset: 0; background: var(--paper-dark);
    border: 1px solid var(--hair);
  }
  .stack-wrap .deck.d1 { transform: rotate(-1.1deg) translate(6px, 8px); z-index: 1; }
  .stack-wrap .deck.d2 { transform: rotate(0.8deg) translate(-5px, 12px); z-index: 0; }
  .paper {
    position: relative; z-index: 2;
    background: var(--paper);
    border: 1px solid var(--hair);
    box-shadow: 0 24px 48px rgba(20,16,8,0.28), 0 4px 12px rgba(20,16,8,0.18);
    transform: rotateX(1deg) rotateY(-0.4deg);
    padding: 2.25rem 2.5rem 2.75rem;
  }
  .masthead { text-align: center; }
  .masthead h1 {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 900; font-size: 46px; letter-spacing: 1px; margin: 0;
    text-transform: uppercase;
  }
  .masthead .tagline { font-style: italic; color: var(--ink-soft); font-size: 13px; margin: 4px 0 0; }
  .masthead-info {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-soft);
    margin: 14px 0 6px; padding-top: 8px; border-top: 1px solid var(--rule);
  }
  .rule-thick { border: none; border-top: 3px solid var(--rule); margin: 2px 0 1px; }
  .rule-thin { border: none; border-top: 1px solid var(--rule); margin: 0 0 16px; }
  .editions { text-align: center; margin: 0 0 20px; }
  .editions button {
    font-family: "PT Serif", serif; background: none; border: none; cursor: pointer;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-faint);
    padding: 4px 14px; border-bottom: 2px solid transparent;
  }
  .editions button.active { color: var(--ink); border-bottom: 2px solid var(--accent); font-weight: 700; }
  .editions span { color: var(--hair); }
  #articles { transform-style: preserve-3d; }
  .lead { border-bottom: 1px double var(--rule); padding-bottom: 20px; margin-bottom: 20px; }
  .kicker {
    display: inline-block; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin-bottom: 6px;
  }
  .lead h2 {
    font-family: "Playfair Display", serif; font-size: 32px; line-height: 1.15; margin: 0 0 10px; font-weight: 800;
  }
  .byline { font-size: 12px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .lead-body { columns: 2; column-gap: 28px; font-size: 15.5px; line-height: 1.65; text-align: justify; hyphens: auto; }
  .lead-body p { margin: 0 0 10px; }
  .lead-body p::first-letter {
    font-family: "Playfair Display", serif; font-size: 46px; font-weight: 900; float: left;
    line-height: 0.8; padding: 4px 6px 0 0; color: var(--ink);
  }
  .analysis { font-size: 14px; color: var(--ink-soft); margin: 8px 0 0; break-inside: avoid; }
  .analysis b { color: var(--ink); }
  .pullquote {
    font-family: "Playfair Display", serif; font-style: italic; font-size: 20px; line-height: 1.4;
    text-align: center; color: var(--ink); margin: 16px auto 6px; max-width: 520px;
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 12px 8px;
  }
  .pullquote .label { display: block; font-family: "PT Serif", serif; font-style: normal; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 6px; font-weight: 700; }
  .tags-row { text-align: center; font-size: 11px; color: var(--ink-faint); text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 8px; }
  .columns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 28px; }
  .story { border-top: 1px solid var(--hair); padding-top: 14px; margin-top: 14px; break-inside: avoid; }
  .story h3 { font-family: "Playfair Display", serif; font-size: 19px; line-height: 1.25; margin: 0 0 6px; font-weight: 700; }
  .story .kicker { font-size: 10.5px; }
  .story .byline { margin-bottom: 8px; }
  .story p { font-size: 14px; line-height: 1.6; text-align: justify; hyphens: auto; margin: 0 0 8px; }
  .story .pullquote { font-size: 15px; margin: 10px auto 4px; padding: 8px 4px; }
  .story .tags-row { text-align: left; }
  .footnote { text-align: center; font-size: 11px; color: var(--ink-faint); font-style: italic; margin-top: 24px;
    border-top: 1px solid var(--hair); padding-top: 12px; }
  @media (max-width: 640px) {
    .paper { padding: 1.5rem 1.25rem 2rem; }
    .masthead h1 { font-size: 30px; }
    .lead h2 { font-size: 24px; }
    .lead-body { columns: 1; }
    .columns-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="stack-wrap">
    <div class="deck d1"></div>
    <div class="deck d2"></div>
    <div class="paper">
      <div class="masthead">
        <h1>Galf Financial Journal</h1>
        <p class="tagline">Notizie che contano. Punti di vista che fanno discutere.</p>
      </div>
      <div class="masthead-info">
        <span id="today-date">Ven 24 lug 2026</span>
        <span id="edition-label">Edizione del mattino</span>
        <span>A cura di Giulio Alfarano</span>
      </div>
      <hr class="rule-thick"><hr class="rule-thin">

      <div class="editions">
        <button id="btn-morning" class="active">Edizione 6:00</button>
        <span>&mdash;</span>
        <button id="btn-afternoon">Edizione 14:00</button>
      </div>

      <div id="articles"></div>

      <p class="footnote">Edizione generata automaticamente sulla base delle notizie finanziarie reali della giornata.</p>
    </div>
  </div>
</div>

<script>
var data = {
  morning: [
    {cat:'Azionario', rel:'Alta', source:'CNBC / Yahoo Finance', time:'05:30', title:'Wall Street affonda: la grande tech fa paura, l\'AI costa troppo', sintesi:'Seduta pesante a New York: Nasdaq -2,15%, S&P 500 -1,21%, Dow -0,97%. A trascinare giù i listini sono stati Tesla (-14%), con utili ben sotto le attese, e Alphabet (-7%), punita nonostante ricavi record perché continua a gonfiare la spesa per l\'intelligenza artificiale. Il mercato non compra più le promesse, vuole i profitti.', perche:'Chi ha fondi o previdenza legati alla Borsa americana ha appena visto quanto pesa una scommessa sull\'AI che non convince più.', spunto:'Quando due giganti battono i ricavi e crollano lo stesso, il problema non sono loro: è il prezzo folle che il mercato ha messo sull\'AI.', tags:['LinkedIn','X']},
    {cat:'Geopolitica', rel:'Alta', source:'Reuters Business', time:'05:45', title:'Il petrolio sfonda i 100 dollari: colpite due petroliere saudite', sintesi:'Il Brent ha superato i 100 dollari al barile e il WTI viaggia sopra 90, ai massimi, dopo che i ribelli Houthi hanno rivendicato l\'attacco a due petroliere saudite nel Mar Rosso, minacciando un blocco navale. Cresce la paura che una delle rotte chiave del greggio mondiale si chiuda.', perche:'Ogni rincaro del barile arriva dritto a benzina e bollette: questa guerra la paghiamo al distributore e alla cassa del supermercato.', spunto:'Il petrolio a 100 dollari non è un incidente di percorso: è il conto salato di un mondo che ha smesso di cercare la pace.', tags:['X','LinkedIn']},
    {cat:'Macro', rel:'Alta', source:'Reuters / FX Leaders', time:'06:00', title:'La Fed verso il rialzo: a settembre scommesse salite all\'80%', sintesi:'Con il petrolio alle stelle e l\'inflazione che non molla, i mercati danno ormai l\'80% di probabilità a un rialzo dei tassi a settembre: un ribaltone totale, perché sei mesi fa si parlava solo di tagli. Il presidente della Fed Warsh insiste che i prezzi restano troppo alti.', perche:'Tassi più alti vogliono dire mutui e prestiti ancora più cari: chi aspettava sollievo dovrà mettersi l\'anima in pace.', spunto:'Il mercato ha passato mesi a sognare tagli: ora rischia di svegliarsi con i rialzi che non voleva nemmeno immaginare.', tags:['LinkedIn','X']},
    {cat:'Commodities', rel:'Media', source:'Reuters / IndexBox', time:'05:15', title:'L\'oro tradisce: giù sotto 4.050 dollari mentre cadono le bombe', sintesi:'In piena guerra e con il dollaro debole, l\'oro è crollato di quasi il 2% scendendo sotto i 4.050 dollari l\'oncia. Il motivo è la paura dei rialzi dei tassi: se i soldi in banca rendono di più, il metallo che non paga interessi perde il suo fascino di bene rifugio.', perche:'Milioni di risparmiatori comprano oro pensando sia sempre al sicuro: oggi scoprono che anche il rifugio più antico può perdere.', spunto:'L\'oro che scende mentre cadono le bombe smonta un mito: nel 2026 il vero rifugio non è il metallo, è il rendimento.', tags:['LinkedIn','Threads']},
    {cat:'Crypto', rel:'Media', source:'Cointelegraph / Fortune', time:'05:00', title:'Bitcoin sotto 65.000: torna la paura e i piccoli scappano', sintesi:'Bitcoin è scivolato sotto i 65.000 dollari, in calo di oltre 600 in un giorno, con tutto il mercato crypto giù dell\'1,3% a 2.300 miliardi e l\'indice di paura precipitato a 28 (zona "paura"). Intanto l\'Argentina studia una legge per far comprare Bitcoin ai fondi d\'investimento.', perche:'Quando la paura torna a dominare, chi è entrato per moda scopre che la crypto sale in fretta ma scende ancora più veloce.', spunto:'Bitcoin come rifugio dalle crisi? Alla prima tempesta vera scende con tutto il resto: la favola del bene rifugio digitale non regge.', tags:['X','Threads']}
  ],
  afternoon: [
    {cat:'Geopolitica', rel:'Alta', source:'Bloomberg Markets', time:'13:30', title:'Trump minaccia l\'Iran, il petrolio resta sul filo dei 100 dollari', sintesi:'Il petrolio viaggia sopra i massimi da due mesi: il Brent ha superato quota 100 dollari e in una settimana è salito di oltre il 13%, con il WTI vicino a 91. A tenere i mercati con il fiato sospeso sono le minacce di Donald Trump, che parla di una possibile rappresaglia militare massiccia contro l\'Iran dopo gli attacchi degli Houthi alle navi nel Mar Rosso.', perche:'Ogni parola di guerra sul petrolio arriva dritta a benzina e bollette: rischiamo di pagare al distributore le tensioni decise a Washington.', spunto:'Il petrolio non sale perché l\'economia va forte, ma perché la guerra fa paura: ed è la paura, non la crescita, a svuotarci il portafoglio.', tags:['X','LinkedIn']},
    {cat:'Macro', rel:'Alta', source:'CNBC / Allianz (El-Erian)', time:'12:30', title:'El-Erian sfida i falchi: «Il peggio dell\'inflazione è alle spalle»', sintesi:'Mentre i mercati scommettono su nuovi rialzi dei tassi, Mohamed El-Erian, consigliere capo di Allianz, va controcorrente: sostiene che il peggio dell\'inflazione è passato e che la Fed dovrebbe restare ferma a guardare. Ma lancia un altro allarme: gli enormi investimenti nell\'intelligenza artificiale rischiano di rivelarsi eccessivi entro tre o quattro anni.', perche:'Se ha ragione, chi teme mutui ancora più cari può tirare il fiato; ma la scommessa sull\'AI resta un azzardo che prima o poi pagheremo tutti.', spunto:'Tutti a temere l\'inflazione di ieri, nessuno a guardare la bolla di domani: l\'AI costa già troppo, e il conto arriverà quando meno ce lo aspettiamo.', tags:['LinkedIn','X']},
    {cat:'Azionario', rel:'Media', source:'Bloomberg Markets', time:'13:00', title:'Il crollo della tech americana contagia l\'Asia: Borse giù in mezzo mondo', sintesi:'Dopo il tonfo di Wall Street, con l\'S&P 500 giù dell\'1,2% (il calo più forte in un mese) e il Nasdaq a -1,9%, la paura si è spostata a Oriente: i futures indicano ribassi per Giappone, Corea del Sud e Australia. Il sell-off partito dai giganti dell\'AI si sta allargando a tutte le Borse.', perche:'Chi pensava che la febbre dell\'AI riguardasse solo poche azioni americane scopre che quando starnutisce la tech si ammala l\'intero pianeta.', spunto:'Bastano due trimestrali deludenti a New York per far tremare mezzo mondo: ecco quanto è fragile una Borsa aggrappata a una manciata di titoli.', tags:['X','LinkedIn']},
    {cat:'Commodities', rel:'Media', source:'CNBC / Trading Economics', time:'11:45', title:'L\'argento si sgonfia: dai 121 dollari di gennaio ai 58 di oggi, dimezzato', sintesi:'Nel silenzio generale l\'argento ha vissuto un tracollo: dal record di oltre 121 dollari l\'oncia di fine gennaio è scivolato a circa 58, più che dimezzato in sei mesi. A pesare è l\'attesa di tassi ancora alti: se i soldi in banca rendono, i metalli che non pagano interessi perdono appeal.', perche:'Chi ha comprato argento sui massimi convinto di avere un rifugio sicuro oggi si ritrova con metà dei suoi soldi: nessun bene è per sempre.', spunto:'L\'argento dimezzato in sei mesi ricorda una verità scomoda: un bene rifugio comprato quando è di moda non è un rifugio, è una trappola.', tags:['LinkedIn','Threads']},
    {cat:'Crypto', rel:'Media', source:'Cointelegraph', time:'11:15', title:'Bitcoin cerca il fondo, ma uno storico exchange chiude i battenti', sintesi:'Con Bitcoin fermo intorno ai 66.000 dollari, gli analisti litigano su un punto: il mercato ha toccato il fondo oppure no? Intanto arriva un segnale pesante: BitMEX, una delle piattaforme di scambio più note e longeve del settore, ha annunciato che chiuderà il 23 settembre. Un pezzo di storia delle crypto esce di scena.', perche:'Quando anche i veterani del settore alzano bandiera bianca, chi è entrato inseguendo il sogno dei guadagni facili dovrebbe farsi qualche domanda.', spunto:'Le banche promettono Bitcoin a 100.000 dollari, ma sul campo gli exchange storici chiudono: guardate cosa fanno gli operatori, non cosa promettono i venditori.', tags:['X','Threads']}
  ]
};

function renderEdition(edition){
  document.getElementById('edition-label').textContent = edition === 'morning' ? 'Edizione del mattino' : 'Edizione del pomeriggio';
  document.getElementById('btn-morning').className = edition === 'morning' ? 'active' : '';
  document.getElementById('btn-afternoon').className = edition === 'afternoon' ? 'active' : '';
  var items = data[edition];
  var container = document.getElementById('articles');
  var lead = items[0];
  var rest = items.slice(1);

  var html = '';
  html += '<div class="lead">' +
    '<span class="kicker">' + lead.cat + ' &middot; Rilevanza ' + lead.rel + '</span>' +
    '<h2>' + lead.title + '</h2>' +
    '<div class="byline">' + lead.source + ' &middot; ' + lead.time + '</div>' +
    '<div class="lead-body"><p>' + lead.sintesi + '</p><p class="analysis"><b>Perché conta.</b> ' + lead.perche + '</p></div>' +
    '<div class="pullquote"><span class="label">Spunto per un post</span>' + lead.spunto + '</div>' +
    '<div class="tags-row">' + lead.tags.join(' &middot; ') + '</div>' +
  '</div>';

  html += '<div class="columns-grid">';
  rest.forEach(function(item){
    html += '<div class="story">' +
      '<span class="kicker">' + item.cat + ' &middot; Rilevanza ' + item.rel + '</span>' +
      '<h3>' + item.title + '</h3>' +
      '<div class="byline">' + item.source + ' &middot; ' + item.time + '</div>' +
      '<p>' + item.sintesi + '</p>' +
      '<p class="analysis"><b>Perché conta.</b> ' + item.perche + '</p>' +
      '<div class="pullquote"><span class="label">Spunto per un post</span>' + item.spunto + '</div>' +
      '<div class="tags-row">' + item.tags.join(' &middot; ') + '</div>' +
    '</div>';
  });
  html += '</div>';

  container.innerHTML = html;
}

function switchEdition(edition){
  var el = document.getElementById('articles');
  el.style.transformOrigin = 'left center';
  el.style.transition = 'transform .35s ease, opacity .35s ease';
  el.style.transform = 'rotateY(-90deg)';
  el.style.opacity = '0';
  setTimeout(function(){
    renderEdition(edition);
    el.style.transition = 'none';
    el.style.transform = 'rotateY(90deg)';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        el.style.transition = 'transform .35s ease, opacity .35s ease';
        el.style.transform = 'rotateY(0deg)';
        el.style.opacity = '1';
      });
    });
  }, 350);
}

document.getElementById('btn-morning').addEventListener('click', function(){ switchEdition('morning'); });
document.getElementById('btn-afternoon').addEventListener('click', function(){ switchEdition('afternoon'); });
renderEdition('morning');
</script>
</body>
</html>
